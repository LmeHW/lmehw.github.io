name: Deploy Hexo Blog

on:
  push:
    branches:
      - backup

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Build and deploy
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          # 让 hexo-deployer-git 使用 token 认证
          sed -i "s|https://github.com/LmeHW/lmehw.github.io|https://LmeHW:${GH_TOKEN}@github.com/LmeHW/lmehw.github.io|" _config.yml
          npx hexo clean
          npx hexo generate
          npx hexo deploy
