name: Deploy Hexo Blog

on:
  push:
    branches:
      - backup

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: |
          npx hexo clean
          npx hexo generate

      - name: Deploy to lmehw.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.GH_TOKEN }}
          external_repository: LmeHW/lmehw.github.io
          publish_branch: main
          publish_dir: ./public
          user_name: 'GitHub Actions'
          user_email: 'actions@github.com'
